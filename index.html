<!DOCTYPE html>
<html>
<head>
<title>Link Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial,sans-serif;
  padding:30px;
}

input{
  width:100%;
  max-width:500px;
  padding:12px;
  margin-bottom:10px;
}

button{
  padding:12px 20px;
  cursor:pointer;
}

#status{
  margin-top:15px;
}
</style>

</head>
<body>

<h2>Link Manager</h2>

<input
id="urlInput"
placeholder="Enter new URL"
/>

<br>

<button onclick="saveUrl()">
Update Link
</button>

<div id="status"></div>

<script>

async function saveUrl(){

const url = document.getElementById('urlInput').value;

if(!url){
  alert('Enter a URL');
  return;
}

document.getElementById('status').innerHTML =
'Updating...';

try{

const response = await fetch('/api/update',{
  method:'POST',
  headers:{
    'Content-Type':'application/json'
  },
  body:JSON.stringify({
    buttonUrl:url
  })
});

const data = await response.json();

if(data.success){

document.getElementById('status').innerHTML =
'✅ URL Updated Successfully';

}else{

document.getElementById('status').innerHTML =
'❌ Update Failed';

}

}catch(err){

document.getElementById('status').innerHTML =
'❌ Error';

}

}

</script>

</body>
</html>
